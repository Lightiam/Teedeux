# Teedeux — Netlify deploy
# Publishes the rebranded AfroConnect storefront in html/

[build]
  publish = "html"
  command = "echo 'Teedeux storefront (rebranded AfroConnect) — static publish'"

[build.environment]
  NODE_VERSION = "22"

# Multi-page HTML — do NOT force SPA fallback to index.html
# (would break listing.html, store-grid.html, checkout.html, etc.)

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/vender/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
