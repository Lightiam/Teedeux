<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff5a1f" />
  <meta name="description" content="Teedeux — African groceries, delivery and pickup." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Teedeux" />
  <link rel="manifest" href="/manifest.webmanifest?v=7" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/styles.css?v=7" />
  <title>Teedeux — African Groceries</title>
  <style>
    html,body{margin:0;background:#f6f1ea;font-family:system-ui,sans-serif}
    #boot-fallback{padding:28px 20px;max-width:430px;margin:0 auto}
    #boot-fallback a{color:#ff5a1f;font-weight:700}
  </style>
</head>
<body>
  <a class="sr-only" href="#main">Skip to content</a>
  <a class="monitor-link" href="/monitor.html" title="Environment monitoring">Monitor</a>
  <a class="admin-link" href="/admin.html" title="Super Admin · update products">Admin</a>
  <div id="app">
    <main id="main" class="app-main" tabindex="-1">
      <div id="boot-fallback">
        <h1>Teedeux</h1>
        <p>Loading African groceries…</p>
        <p><a href="/?reset=1">Reset cache</a> · <a href="/monitor.html">Open monitor</a> · <a href="/admin.html">Super Admin</a></p>
      </div>
    </main>
    <nav class="app-nav" id="app-nav" aria-label="Primary">
      <div class="app-nav__inner">
        <a class="nav-item active" data-nav="home" href="#/home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m4 11 8-7 8 7"/><path d="M6 10v10h12V10"/></svg>
          Home
        </a>
        <a class="nav-item" data-nav="favorites" href="#/favorites">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 21s-7-4.4-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 11c0 5.6-7 10-7 10z"/></svg>
          Favorites
        </a>
        <a class="nav-item" data-nav="cart" href="#/cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/><path d="M3 3h2l2.2 11h10.6l2-8H7"/></svg>
          Cart
          <span class="nav-badge" id="nav-cart-badge" hidden>0</span>
        </a>
        <a class="nav-item" data-nav="orders" href="#/orders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/></svg>
          Orders
        </a>
        <a class="nav-item" data-nav="profile" href="#/profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Profile
        </a>
      </div>
    </nav>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      var APP_BUILD = '7';
      var params = new URLSearchParams(location.search);
      var needReset = params.get('reset') === '1' || localStorage.getItem('teedeux-build') !== APP_BUILD;
      function done() {
        try { localStorage.setItem('teedeux-build', APP_BUILD); } catch (e) {}
        if (params.get('reset') === '1') {
          params.delete('reset');
          var q = params.toString();
          location.replace(location.pathname + (q ? '?' + q : '') + (location.hash || '#/home'));
        }
      }
      if (!needReset || !('serviceWorker' in navigator)) { done(); return; }
      Promise.resolve()
        .then(function () { return caches.keys(); })
        .then(function (keys) { return Promise.all(keys.map(function (k) { return caches.delete(k); })); })
        .then(function () { return navigator.serviceWorker.getRegistrations(); })
        .then(function (regs) { return Promise.all(regs.map(function (r) { return r.unregister(); })); })
        .catch(function () {})
        .then(done);
    })();
  </script>
  <script src="/js/catalog.js?v=7" defer></script>
  <script src="/js/backend.js?v=7" defer></script>
  <script src="/js/store.js?v=7" defer></script>
  <script src="/js/app.js?v=7" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js?v=7', { scope: '/' }).catch(function () {});
      });
    }
  </script>
</body>
</html>
