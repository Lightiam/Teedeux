<style>
        @keyframes reveal {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes pulse-subtle {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        .animate-reveal {
            animation: reveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .animate-pulse-slow {
            animation: pulse-subtle 3s ease-in-out infinite;
        }
        .grain-overlay {
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.05;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-brand-orange overflow-hidden h-screen w-screen flex flex-items-center justify-center relative">
<!-- Background Atmospheric Layer -->
<div class="absolute inset-0 z-0">
<!-- Subtle radial glow behind the logo -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_rgba(255,255,255,0.15)_0%,_transparent_70%)]"></div>
<div class="absolute inset-0 grain-overlay pointer-events-none"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop text-center">
<!-- Logo Reveal -->
<div class="animate-reveal flex flex-col items-center gap-stack-lg">
<!-- Abstract Iconography / Brand Mark -->
<div class="mb-stack-md">
<div class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-lg shadow-black/10">
<span class="material-symbols-outlined text-[48px] text-brand-orange" style="font-variation-settings: 'FILL' 1;">
                        shopping_basket
                    </span>
</div>
</div>
<!-- Brand Wordmark -->
<h1 class="font-headline-xl text-headline-xl text-white tracking-tight drop-shadow-sm">
                Teedeux Mart
            </h1>
<!-- Tagline -->
<p class="font-body-lg text-body-lg text-white/90 max-w-xs animate-pulse-slow">
                Freshness delivered daily. Authentically African.
            </p>
</div>
<!-- Footer Loading / Status Indicator -->
<div class="absolute bottom-16 left-0 w-full flex flex-col items-center gap-stack-sm opacity-60">
<div class="w-12 h-1 bg-white/20 rounded-full overflow-hidden">
<div class="h-full bg-white w-0 transition-all duration-[2000ms] ease-out" id="progress-bar"></div>
</div>
<span class="font-label-sm text-label-sm text-white uppercase tracking-widest">
                Initializing
            </span>
</div>
</main>
<!-- Decorative Illustration elements (Asymmetric) -->
<div class="absolute -top-12 -right-12 w-64 h-64 opacity-10 rotate-12">
<div class="w-full h-full bg-white rounded-full blur-3xl"></div>
</div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 opacity-10">
<div class="w-full h-full bg-lush-leaf rounded-full blur-[100px]"></div>
</div>
<!-- Background Images for Context (Subtle Blending) -->
<div class="absolute bottom-0 right-0 w-1/3 h-1/2 opacity-20 pointer-events-none">
<div class="w-full h-full bg-cover bg-bottom" data-alt="A cinematic, high-resolution close-up of vibrant, sun-ripened tropical fruits like mangoes, plantains, and peppers arranged artistically. The lighting is warm and golden, evoking a rich African marketplace at sunset. The image uses a shallow depth of field to keep the focus sharp on the textures of the produce, blending softly into the brand orange background of the UI." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB3xqet144XxHqrbon4pB04pdlf4syFALQkX52f9vZum0Cd82TvgTq0pLJBA7MN70YDQ_kEZG2lv_xhl338XQPMZpSL2crAX6ADXRFNg06VhG_7_q2KLRYaZtuC3X4iIXjyParFrpAywjxQ2Hbz12u7AGufIq_lIm2QIGzbxk3BJUiWUUnsaZnPFbCNbWfLCsrfF3dnmYMYoSM936OfQlqueTNq1EPUaXMBLLMVbR3LnmhC5UXGE06JmA')">
</div>
</div>
<script>
        // Progress bar simulation for the splash screen feel
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progress-bar');
            setTimeout(() => {
                bar.style.width = '100%';
            }, 100);

            // Logic to simulate redirection or app entry
            setTimeout(() => {
                console.log('Teedeux Mart Loaded. Navigating to Dashboard...');
                // In a real app, window.location.href = '/home' would go here
            }, 2500);
        });

        // Simple parallax micro-interaction on mouse move
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            const logo = document.querySelector('.animate-reveal');
            if(logo) {
                logo.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
