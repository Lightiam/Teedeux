<script>
        // Micro-interaction for quantity buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(btn.querySelector('.material-symbols-outlined')) {
                    const icon = btn.querySelector('.material-symbols-outlined');
                    if(icon.innerText === 'add' || icon.innerText === 'remove') {
                        // Logic for increment/decrement would go here
                        const counter = btn.parentElement.querySelector('span');
                        let val = parseInt(counter.innerText);
                        if(icon.innerText === 'add') counter.innerText = val + 1;
                        if(icon.innerText === 'remove' && val > 0) counter.innerText = val - 1;
                    }
                }
            });
        });

        // Close interaction (visual only for this prototype)
        const closeBtn = document.querySelector('button .material-symbols-outlined[innerText="close"]')?.parentElement;
        if(closeBtn) {
            closeBtn.addEventListener('click', () => {
                document.querySelector('.cart-slide-up').style.transform = 'translateY(100%)';
                document.querySelector('.blur-overlay').style.opacity = '0';
                setTimeout(() => {
                    window.location.reload(); // Simple reset for demo
                }, 400);
            });
        }
    </script>
