<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .onboarding-gradient {
            background: linear-gradient(180deg, rgba(252, 249, 248, 0) 0%, #fcf9f8 100%);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

            box-shadow: 0 10px 30px -10px rgba(156, 63, 0, 0.12);

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-x-hidden">
<!-- Top AppBar (Simplified for Onboarding - No Global Nav as per mandate) -->
<header class="w-full top-0 sticky z-50 bg-background">
<div class="flex justify-between items-center px-margin-mobile py-base w-full max-w-container-max mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-headline-lg-mobile">location_on</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Teedeux Mart</span>
</div>
<button class="text-on-surface-variant font-label-md px-4 py-2 hover:opacity-80 transition-opacity active:scale-95">
                Skip
            </button>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-stack-lg max-w-lg mx-auto w-full relative">
<!-- Hero Section: Modern Asymmetric Layout -->
<div class="w-full relative mb-12">
<!-- Decorative Element -->
<div class="absolute -top-10 -right-10 w-48 h-48 bg-primary-fixed opacity-30 rounded-full blur-3xl"></div>
<!-- Hero Image Container -->
<div class="relative z-10 w-full aspect-square md:aspect-video rounded-3xl overflow-hidden shadow-soft border border-outline-variant/30 animate-float">
<div class="absolute inset-0 bg-savanna-sand"></div>
<div class="w-full h-full" data-alt="A professional delivery driver in a neat uniform with a warm smile, standing next to a modern, branded electric delivery van filled with vibrant fresh African produce. The scene is set in a sun-drenched suburban neighborhood with lush greenery and clean architectural lines. The lighting is warm and golden, reflecting a premium service feel with a color palette of burnt orange and forest green. The composition is clean and focused on the reliability and friendliness of the service." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA7mktRaB2FMJErgQH0GwwHGXguXl-VTxWG20UxTPr_8e6RjRl6R0kmH-E7NwsolKcmSJxXlMIbF48CmG1zukC7sgs9xXviYF8byNRSZiDDca3ThcNGI3v53FHcIdzK7sTdbyrGDAmOLrL1vh3MdrDwf6wktU1Geng6eAPABu2T-Kwhnmti3tSS9hH1bHZg80y76Zw86vk6waE6U74hu6QjCIC0OfIEFp-YHyRA5YUFWXK2FXkDwM6SEQ')"></div>
<!-- Overlay Card: Floating Window Info -->
<div class="absolute bottom-6 left-6 right-6 bg-white/90 backdrop-blur-md p-4 rounded-xl border border-white/50 flex items-center gap-4 shadow-lg">
<div class="w-12 h-12 bg-secondary-container rounded-full flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined">schedule</span>
</div>
<div>
<p class="font-label-sm text-on-surface-variant uppercase tracking-wider">Earliest Slot</p>
<p class="font-headline-md text-headline-md text-lush-leaf">Today, 2:00 PM</p>
</div>
</div>
</div>
</div>
<!-- Content Section -->
<div class="text-center w-full space-y-stack-md">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-background px-4">
                Convenience on Your Schedule
            </h1>
<p class="text-on-surface-variant font-body-lg px-2 max-w-sm mx-auto">
                Choose delivery windows that work for you, 7 days a week. From dawn till dusk, we're here for you.
            </p>
</div>
<!-- Progress Indicator & Actions Footer -->
<div class="mt-12 w-full space-y-stack-lg">
<!-- Dots -->
<div class="flex justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-6 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- Main Button -->
<div class="flex flex-col gap-4">
<button class="w-full py-4 bg-primary text-on-primary font-headline-md text-headline-md rounded-xl shadow-lg active:scale-[0.98] transition-transform hover:bg-primary-container">
                    Get Started
                </button>
<!-- Secondary Info: Micro-copy -->
<p class="text-center font-label-sm text-on-surface-variant">
                    Reliable delivery to <span class="text-primary font-bold">120+ Metro Zones</span>
</p>
</div>
</div>

<div class="fixed bottom-0 left-0 w-full h-1/3 onboarding-gradient pointer-events-none -z-10"></div>

<div class="fixed top-1/4 -left-12 w-24 h-24 bg-lush-leaf opacity-10 rounded-full blur-2xl"></div>
<div class="fixed bottom-1/4 -right-12 w-32 h-32 bg-chili-red opacity-10 rounded-full blur-2xl"></div>
<script>
        // Simple Interaction logic
        document.querySelector('button').addEventListener('click', function() {
            // Add a subtle ripple or transition effect if needed
            this.classList.add('opacity-80');
            setTimeout(() => {
                this.classList.remove('opacity-80');
            }, 200);
        });

        // Animation for progress dots or hero float could be enhanced here
    </script>
