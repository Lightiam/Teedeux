<style>
        .onboarding-gradient {
            background: linear-gradient(180deg, rgba(252, 249, 248, 0) 0%, rgba(252, 249, 248, 1) 65%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-animation {
            animation: float 4s ease-in-out infinite;
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-primary selection:text-white">
<!-- Top Navigation (Skip) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-end items-center px-margin-mobile py-stack-lg md:px-margin-desktop">
<button class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors active:scale-95 duration-200">
            Skip
        </button>
</header>
<main class="flex-grow flex flex-col relative">
<!-- Hero Section -->
<div class="relative w-full h-[60vh] md:h-[70vh] flex items-center justify-center overflow-hidden">
<!-- Main Hero Image -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="A lush and vibrant close-up of premium African produce including ripe golden plantains, earthy brown yams, and vibrant red bird's eye chili peppers arranged artfully on a rustic wooden table. The lighting is warm and golden, reminiscent of a sunset in the savanna, highlighting the textures of the spices. The overall style is modern and high-end, with a soft-focus background that makes the fresh ingredients pop against the light-mode savanna sand palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDG1xZT0neT4GuEQdRW4KmOoVq4vcOzxdayO7NQdzdxVBHyItU0tZqiXOFr6_l4JdlKWTxx3tWP_vMgcfKXkAGOr57V1eB0RrtKhTPI2Z5B3tX8tQSZDo9ZDYLSFS7llSv-AWVLEvS_U5UiKActJN1psXNoM5eei_qJ4kskCyxss3TNbbQmWZFkY11WowU6u4_oN5DxjXYz6KpbrYGE1PZKf2oKtdsGm1XoklnVngmxfuNI7YRMlQnCiA"/>
<!-- Soft Tonal Overlay for Text Legibility -->
<div class="absolute inset-0 onboarding-gradient"></div>
</div>
<!-- Floating Brand Element (Subtle Micro-interaction) -->
<div class="z-10 float-animation flex items-center justify-center p-base bg-surface-container-lowest rounded-full shadow-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-[32px]">eco</span>
</div>
</div>
<!-- Content Section -->
<div class="relative z-10 flex flex-col items-center text-center px-margin-mobile -mt-16 md:-mt-24 md:px-margin-desktop max-w-container-max mx-auto w-full">
<div class="bg-white/80 backdrop-blur-sm p-stack-lg rounded-3xl md:bg-transparent md:backdrop-blur-none">
<!-- Branding Anchor -->
<p class="font-label-sm text-label-sm uppercase tracking-widest text-primary mb-stack-md">Discover African Flavors</p>
<!-- Headline -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-xl md:text-headline-xl text-on-background max-w-2xl mx-auto">
                    Freshness from the <span class="text-primary">Source</span>
</h1>
<!-- Subtext -->
<p class="font-body-lg text-body-lg text-on-surface-variant mt-stack-md max-w-lg mx-auto leading-relaxed">
                    Explore authentic ingredients delivered straight from our trusted local farms to your kitchen door.
                </p>
</div>
<!-- Progress Indicator & Actions -->
<div class="mt-stack-lg w-full flex flex-col items-center gap-stack-lg pb-12">
<!-- Progress Dots -->
<div class="flex gap-2 mb-stack-md">
<div class="h-2 w-8 rounded-full bg-primary transition-all duration-300"></div>
<div class="h-2 w-2 rounded-full bg-surface-container-highest hover:bg-primary/50 cursor-pointer transition-colors"></div>
<div class="h-2 w-2 rounded-full bg-surface-container-highest hover:bg-primary/50 cursor-pointer transition-colors"></div>
</div>
<!-- Primary Action Button -->
<button class="w-full max-w-md bg-primary text-white py-4 px-8 rounded-xl font-headline-md text-headline-md shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex justify-center items-center gap-2">
                    Next
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Visual Embellishment: Savanna Pattern -->
<div class="fixed bottom-0 right-0 opacity-5 pointer-events-none select-none z-[-1] overflow-hidden">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle class="text-primary" cx="200" cy="200" r="180" stroke="currentColor" stroke-dasharray="10 10" stroke-width="0.5"></circle>
<circle class="text-primary" cx="200" cy="200" r="120" stroke="currentColor" stroke-dasharray="5 5" stroke-width="0.5"></circle>
<path class="text-primary" d="M200 20L200 380M20 200L380 200" stroke="currentColor" stroke-width="0.5"></path>
</svg>
</div>
<script>
        // Simple micro-interaction for the Next button
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            // Simulated navigation effect
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                this.innerHTML = 'Next <span class="material-symbols-outlined">arrow_forward</span>';
            }, 800);
        });

        // Entrance animation logic
        window.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('h1, p, .flex.gap-2, button');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 * index);
            });
        });
    </script>
